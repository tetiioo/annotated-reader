<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Annotated Reader</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --ink: #2b2b2b;
    --muted: #8a8a8a;
    --line: #e7e5df;
    --accent: #6b4ee6;
    --hl: #fff1a8;
    --hl-active: #ffd84d;
    --shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 270px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .brand {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
  }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: -.2px; }
  .brand p { font-size: 12px; color: var(--muted); margin: 4px 0 0; }
  .toc { flex: 1; overflow-y: auto; padding: 10px 8px; }
  .toc-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    padding: 8px 12px; margin: 2px 0;
    border-radius: 8px; cursor: pointer; font-size: 13.5px;
    color: #444; line-height: 1.3;
  }
  .toc-item:hover { background: #f1eefb; }
  .toc-item.active { background: #ece7fb; color: var(--accent); font-weight: 600; }
  .toc-item.lvl3 { padding-left: 26px; font-size: 12.5px; color: #666; }
  .toc-badge {
    flex-shrink: 0;
    min-width: 20px; height: 20px; padding: 0 6px;
    border-radius: 10px; background: var(--hl-active); color: #5a4500;
    font-size: 11px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .toolbar { padding: 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; }
  .btn {
    appearance: none; border: 1px solid var(--line); background: #fff;
    padding: 8px 10px; border-radius: 8px; font-size: 12.5px; cursor: pointer;
    color: #333; font-weight: 600; text-align: center;
  }
  .btn:hover { background: #f5f3ff; border-color: #d9d2f7; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #5a3fd6; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* ---- Main reading area ---- */
  .main { flex: 1; overflow-y: auto; position: relative; }
  .doc {
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 80px 160px 56px;
  }
  .doc h1 { font-size: 30px; letter-spacing: -.5px; margin: 0 0 8px; }
  .doc h2 { font-size: 23px; letter-spacing: -.3px; margin: 44px 0 10px; padding-top: 8px; }
  .doc h3 { font-size: 18px; margin: 30px 0 8px; }
  .doc p, .doc li { font-size: 16px; line-height: 1.72; color: #333; }
  .doc ul, .doc ol { padding-left: 24px; }
  .doc blockquote {
    margin: 18px 0; padding: 4px 18px; border-left: 3px solid #d8d2f5;
    color: #555; background: #faf9ff;
  }
  .doc code {
    background: #f0eef8; padding: 2px 6px; border-radius: 5px;
    font-size: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .doc pre { background: #2b2740; color: #eee; padding: 16px; border-radius: 10px; overflow-x:auto; }
  .doc pre code { background: none; color: inherit; padding: 0; }
  .doc img { max-width: 100%; border-radius: 8px; }
  .doc hr { border: none; border-top: 1px solid var(--line); margin: 36px 0; }

  /* highlight marks */
  mark.anno {
    background: var(--hl);
    border-bottom: 2px solid #ecc94b;
    border-radius: 2px;
    cursor: pointer;
    padding: 1px 0;
    transition: background .15s;
  }
  mark.anno:hover { background: var(--hl-active); }
  mark.anno.active { background: var(--hl-active); box-shadow: 0 0 0 3px rgba(255,216,77,.4); }

  /* ---- Floating "add comment" button on selection ---- */
  #addBtn {
    position: absolute; z-index: 40; display: none;
    background: var(--accent); color: #fff; border: none;
    padding: 7px 12px; border-radius: 20px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; box-shadow: var(--shadow);
  }
  #addBtn:hover { background: #5a3fd6; }

  /* ---- Comment panel (fixed, always on screen) ---- */
  #popover {
    position: fixed; z-index: 50; width: 330px; display: none;
    right: 28px; bottom: 28px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,.18); overflow: hidden;
    animation: popIn .14s ease-out;
  }
  @keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  #popover .pop-head {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); display:flex; align-items:center; justify-content:space-between;
  }
  #popover .pop-quote {
    margin: 10px 14px 0; padding: 8px 10px; font-size: 12.5px; color: #6a5a00;
    background: #fff8db; border-radius: 8px; border-left: 3px solid var(--hl-active);
    max-height: 70px; overflow-y: auto;
  }
  #popover textarea {
    width: calc(100% - 28px); margin: 10px 14px; min-height: 84px; resize: vertical;
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px;
    font-size: 14px; font-family: inherit; line-height: 1.5;
  }
  #popover .pop-body { padding: 6px 14px 12px; font-size: 14px; line-height: 1.55; color: #333; white-space: pre-wrap; }
  #popover .pop-actions { display: flex; gap: 8px; padding: 0 14px 14px; }
  #popover .pop-actions .btn { flex: 1; padding: 7px; }
  .icon-x { cursor:pointer; color: var(--muted); font-weight: 700; }
  .icon-x:hover { color: #333; }

  /* empty state / dropzone */
  #empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; color: var(--muted);
    padding: 40px;
  }
  #empty h2 { color: #444; font-size: 20px; margin: 18px 0 6px; }
  #empty p { max-width: 420px; line-height: 1.6; }
  .drop { margin-top: 22px; border: 2px dashed #d2cdf0; border-radius: 14px; padding: 30px 40px; background:#fbfaff; }
  .hide { display: none !important; }
  input[type=file] { display: none; }
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <h1>📝 Annotated Reader</h1>
      <p>Select any text and a comment box opens. Click a highlight to read its comment.</p>
    </div>
    <div class="toc" id="toc"></div>
    <div class="toolbar">
      <button class="btn primary" id="loadBtn">Load .md file</button>
      <div class="btn-row">
        <button class="btn" id="exportBtn">Export comments</button>
        <button class="btn" id="importBtn">Import</button>
      </div>
      <button class="btn" id="sampleBtn">Try sample</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="doc" id="doc"></div>

    <div id="empty">
      <div style="font-size:54px">🗂️</div>
      <h2>No document loaded</h2>
      <p>Load a Markdown file with chapters (use <code>#</code> and <code>##</code> headings). It’ll appear here, split by chapter in the sidebar.</p>
      <div class="drop">Drag &amp; drop a <b>.md</b> file here,<br/> or click <b>Load .md file</b>.</div>
    </div>

    <div id="popover"></div>
  </main>

  <input type="file" id="fileInput" accept=".md,.markdown,.txt" />
  <input type="file" id="importInput" accept=".json" />

<script>
/* =========================================================================
   Annotated Reader — single-file MD annotation tool
   - Parses markdown, builds chapter TOC from headings
   - Select text -> add comment (stored by character offset within chapter)
   - Highlights persist in localStorage, keyed by document
   ========================================================================= */

const docEl   = document.getElementById('doc');
const tocEl   = document.getElementById('toc');
const mainEl  = document.getElementById('main');
const emptyEl = document.getElementById('empty');
const popover = document.getElementById('popover');

let state = {
  key: null,          // localStorage key for current doc
  title: 'Untitled',
  chapters: [],       // [{id, level, title, el}]
  annotations: [],    // [{id, chapterId, start, end, text, comment}]
  pending: null       // selection awaiting a comment
};

/* ---------- Markdown rendering + chaptering ---------- */
function renderMarkdown(md) {
  marked.setOptions({ gfm: true, breaks: false });
  docEl.innerHTML = marked.parse(md);
  emptyEl.classList.add('hide');

  // First H1 is the doc title
  const h1 = docEl.querySelector('h1');
  state.title = h1 ? h1.textContent.trim() : 'Untitled document';

  // Group content into chapter sections so we can offset-anchor inside each
  buildChapters();
  buildTOC();
}

function buildChapters() {
  state.chapters = [];
  // We treat each H1/H2 as a chapter boundary; wrap following siblings
  const nodes = Array.from(docEl.childNodes);
  docEl.innerHTML = '';
  let current = null;
  let idx = 0;

  function newChapter(level, title) {
    idx++;
    const sec = document.createElement('section');
    sec.className = 'chapter';
    sec.dataset.chapterId = 'ch' + idx;
    docEl.appendChild(sec);
    const ch = { id: 'ch' + idx, level, title, el: sec };
    state.chapters.push(ch);
    current = sec;
    return ch;
  }
  // a default chapter for any preamble before first heading
  newChapter(1, state.title);

  nodes.forEach(node => {
    if (node.nodeType === 1 && (node.tagName === 'H1' || node.tagName === 'H2')) {
      const ch = newChapter(node.tagName === 'H1' ? 1 : 2, node.textContent.trim());
      current.appendChild(node);
      ch.el.id = ch.id;
    } else {
      current.appendChild(node);
    }
  });

  // drop the empty default preamble chapter if it has no real content
  if (state.chapters.length > 1) {
    const first = state.chapters[0];
    if (first.el.textContent.trim() === '') {
      first.el.remove();
      state.chapters.shift();
    }
  }
}

function buildTOC() {
  tocEl.innerHTML = '';
  state.chapters.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'toc-item' + (ch.level === 2 ? ' lvl3' : '');
    const label = document.createElement('span');
    label.textContent = ch.title || '(untitled)';
    item.appendChild(label);
    const badge = document.createElement('span');
    badge.className = 'toc-badge';
    badge.dataset.badgeFor = ch.id;
    badge.style.display = 'none';
    item.appendChild(badge);
    item.onclick = () => ch.el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    tocEl.appendChild(item);
  });
  refreshBadges();
}

function refreshBadges() {
  state.chapters.forEach(ch => {
    const n = state.annotations.filter(a => a.chapterId === ch.id).length;
    const badge = tocEl.querySelector(`[data-badge-for="${ch.id}"]`);
    if (badge) { badge.textContent = n; badge.style.display = n ? 'inline-flex' : 'none'; }
  });
}

/* ---------- Offset helpers (anchor by plain-text char offset in chapter) ---------- */
function getOffsetWithin(container, node, offset) {
  let total = 0, done = false;
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  let n;
  while ((n = walker.nextNode())) {
    if (n === node) { total += offset; done = true; break; }
    total += n.nodeValue.length;
  }
  return done ? total : null;
}

function chapterOfNode(node) {
  let el = node.nodeType === 1 ? node : node.parentElement;
  while (el && el !== docEl) {
    if (el.dataset && el.dataset.chapterId) return el;
    el = el.parentElement;
  }
  return null;
}

/* Wrap [start,end) plain-text range inside a chapter element with a <mark> */
function wrapRange(chapterEl, start, end, annoId) {
  const walker = document.createTreeWalker(chapterEl, NodeFilter.SHOW_TEXT);
  let pos = 0, n;
  const ranges = [];
  while ((n = walker.nextNode())) {
    const len = n.nodeValue.length;
    const nodeStart = pos, nodeEnd = pos + len;
    if (nodeEnd > start && nodeStart < end) {
      const s = Math.max(start, nodeStart) - nodeStart;
      const e = Math.min(end, nodeEnd) - nodeStart;
      ranges.push({ node: n, s, e });
    }
    pos = nodeEnd;
    if (pos >= end) break;
  }
  // wrap from last to first so offsets stay valid
  ranges.reverse().forEach(r => {
    const range = document.createRange();
    range.setStart(r.node, r.s);
    range.setEnd(r.node, r.e);
    const mark = document.createElement('mark');
    mark.className = 'anno';
    mark.dataset.annoId = annoId;
    try { range.surroundContents(mark); }
    catch (err) { /* skip ranges that cross element boundaries unevenly */ }
  });
}

function applyAllHighlights() {
  // clear existing marks first (unwrap)
  docEl.querySelectorAll('mark.anno').forEach(m => {
    const parent = m.parentNode;
    while (m.firstChild) parent.insertBefore(m.firstChild, m);
    parent.removeChild(m);
    parent.normalize();
  });
  // re-apply
  state.annotations.forEach(a => {
    const ch = state.chapters.find(c => c.id === a.chapterId);
    if (ch) wrapRange(ch.el, a.start, a.end, a.id);
  });
  refreshBadges();
}

/* ---------- Selection -> open comment editor directly ---------- */
document.addEventListener('mouseup', (e) => {
  if (popover.contains(e.target)) return;          // ignore selecting inside the panel
  if (e.target.closest && e.target.closest('mark.anno')) return; // marks open the viewer
  setTimeout(maybeStartComment, 10);
});

function maybeStartComment() {
  // if the editor is already open, don't hijack
  if (popover.style.display === 'block') return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
  const text = sel.toString();
  if (text.trim().length < 2) return;              // ignore tiny/stray selections

  const range = sel.getRangeAt(0);
  if (!docEl.contains(range.commonAncestorContainer)) return;
  const ch = chapterOfNode(range.startContainer);
  if (!ch) return;
  const start = getOffsetWithin(ch, range.startContainer, range.startOffset);
  const end   = getOffsetWithin(ch, range.endContainer, range.endOffset);
  if (start == null || end == null || end <= start) return;

  state.pending = {
    id: 'a' + Date.now() + Math.floor(Math.random()*1000),
    chapterId: ch.dataset.chapterId,
    start, end,
    text: text,
    comment: ''
  };
  sel.removeAllRanges();
  openEditor(state.pending);
}

/* ---------- Panel (editor + viewer) — fixed bottom-right, always visible ---------- */
function placePopover() {
  popover.style.display = 'block';
}

function openEditor(anno) {
  popover.innerHTML = `
    <div class="pop-head">New comment <span class="icon-x" data-act="cancel">✕</span></div>
    <div class="pop-quote">“${escapeHtml(anno.text)}”</div>
    <textarea placeholder="Write your comment…"></textarea>
    <div class="pop-actions">
      <button class="btn" data-act="cancel">Cancel</button>
      <button class="btn primary" data-act="save">Save comment</button>
    </div>`;
  placePopover();
  const ta = popover.querySelector('textarea');
  ta.focus();
  popover.querySelectorAll('[data-act]').forEach(b => b.onclick = () => {
    if (b.dataset.act === 'save') {
      const val = ta.value.trim();
      if (!val) { ta.focus(); return; }
      anno.comment = val;
      state.annotations.push(anno);
      applyAllHighlights();
      persist();
      closePopover();
    } else { closePopover(); }
  });
  // Cmd/Ctrl+Enter to save
  ta.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') popover.querySelector('[data-act="save"]').click();
  });
}

function openViewer(anno, markEl) {
  popover.innerHTML = `
    <div class="pop-head">Comment <span class="icon-x" data-act="close">✕</span></div>
    <div class="pop-quote">“${escapeHtml(anno.text)}”</div>
    <div class="pop-body">${escapeHtml(anno.comment)}</div>
    <div class="pop-actions">
      <button class="btn" data-act="edit">Edit</button>
      <button class="btn" data-act="delete">Delete</button>
    </div>`;
  placePopover(markEl.getBoundingClientRect());
  popover.querySelector('[data-act="close"]').onclick = closePopover;
  popover.querySelector('[data-act="edit"]').onclick = () => openEditor2(anno, markEl);
  popover.querySelector('[data-act="delete"]').onclick = () => {
    state.annotations = state.annotations.filter(a => a.id !== anno.id);
    applyAllHighlights(); persist(); closePopover();
  };
}

function openEditor2(anno, markEl) {
  popover.innerHTML = `
    <div class="pop-head">Edit comment <span class="icon-x" data-act="cancel">✕</span></div>
    <div class="pop-quote">“${escapeHtml(anno.text)}”</div>
    <textarea>${escapeHtml(anno.comment)}</textarea>
    <div class="pop-actions">
      <button class="btn" data-act="cancel">Cancel</button>
      <button class="btn primary" data-act="save">Save</button>
    </div>`;
  placePopover(markEl.getBoundingClientRect());
  const ta = popover.querySelector('textarea'); ta.focus();
  popover.querySelector('[data-act="save"]').onclick = () => {
    const v = ta.value.trim(); if (!v) { ta.focus(); return; }
    anno.comment = v; persist(); openViewer(anno, markEl);
  };
  popover.querySelector('[data-act="cancel"]').onclick = () => openViewer(anno, markEl);
}

function closePopover() {
  popover.style.display = 'none';
  popover.innerHTML = '';
  docEl.querySelectorAll('mark.anno.active').forEach(m => m.classList.remove('active'));
}

/* click a highlight to view its comment */
docEl.addEventListener('click', (e) => {
  const mark = e.target.closest('mark.anno');
  if (!mark) return;
  e.stopPropagation();
  const anno = state.annotations.find(a => a.id === mark.dataset.annoId);
  if (!anno) return;
  docEl.querySelectorAll('mark.anno.active').forEach(m => m.classList.remove('active'));
  document.querySelectorAll(`mark.anno[data-anno-id="${anno.id}"]`).forEach(m => m.classList.add('active'));
  openViewer(anno, mark);
});

/* click elsewhere closes popover (but not when a fresh text selection is being made) */
document.addEventListener('mousedown', (e) => {
  if (popover.style.display === 'block' && !popover.contains(e.target) && !e.target.closest('mark.anno')) {
    // only auto-close the read-only viewer; keep an in-progress editor open
    if (!popover.querySelector('textarea')) closePopover();
  }
});

/* ---------- Persistence ---------- */
function docKey(title, md) {
  // stable-ish key from title + length
  return 'annoreader:' + title + ':' + md.length;
}
function persist() {
  if (!state.key) return;
  localStorage.setItem(state.key, JSON.stringify({
    title: state.title, annotations: state.annotations
  }));
  refreshBadges();
}
function loadPersisted(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return [];
    return JSON.parse(raw).annotations || [];
  } catch { return []; }
}

/* ---------- Load flow ---------- */
function loadDocument(md, fname) {
  renderMarkdown(md);
  state.key = docKey(state.title || fname || 'doc', md);
  state.annotations = loadPersisted(state.key);
  applyAllHighlights();
}

/* ---------- File input / drag-drop ---------- */
const fileInput = document.getElementById('fileInput');
document.getElementById('loadBtn').onclick = () => fileInput.click();
fileInput.onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => loadDocument(r.result, f.name);
  r.readAsText(f);
};
['dragover','drop'].forEach(ev => mainEl.addEventListener(ev, e => e.preventDefault()));
mainEl.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f && /\.(md|markdown|txt)$/i.test(f.name)) {
    const r = new FileReader(); r.onload = () => loadDocument(r.result, f.name); r.readAsText(f);
  }
});

/* ---------- Export / Import comments ---------- */
document.getElementById('exportBtn').onclick = () => {
  const data = JSON.stringify({ title: state.title, annotations: state.annotations }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.title || 'comments').replace(/\W+/g,'_') + '.comments.json';
  a.click();
};
const importInput = document.getElementById('importInput');
document.getElementById('importBtn').onclick = () => importInput.click();
importInput.onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const obj = JSON.parse(r.result);
      if (Array.isArray(obj.annotations)) {
        state.annotations = obj.annotations;
        applyAllHighlights(); persist();
      }
    } catch { alert('Could not read that comments file.'); }
  };
  r.readAsText(f);
};

/* ---------- Utils ---------- */
function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- Sample doc ---------- */
const SAMPLE = `# The Product Vision

This document outlines where we are headed and why it matters. Read it once, then leave your thoughts in the margins.

## Chapter 1 — The Problem

Most people struggle to keep track of feedback scattered across email, chat, and documents. By the time a decision is made, the reasoning behind it is lost. We want a single place where context lives next to the text it describes.

The core insight is simple: **comments should be attached to the exact words they refer to**, not floating at the bottom of a page.

## Chapter 2 — The Approach

We highlight the relevant passage and anchor a comment to it. Clicking the highlight reveals the note. This keeps the reading experience clean while making every annotation one click away.

> A good annotation tool disappears until you need it.

## Chapter 3 — Next Steps

Next we will add multi-user comments, threaded replies, and a way to resolve discussions. For now, try selecting any sentence above and writing a comment.`;

document.getElementById('sampleBtn').onclick = () => loadDocument(SAMPLE, 'sample.md');

// auto-load sample on first open so the page isn't empty
loadDocument(SAMPLE, 'sample.md');
</script>
</body>
</html>
